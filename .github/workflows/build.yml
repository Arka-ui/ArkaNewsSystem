name: Verify & Publish ANS
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "ans-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install cryptography

      - name: Auto-fill ans.config.json with repo info
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          cfg = {}
          p = Path("ans.config.json")
          if p.exists():
              cfg = json.loads(p.read_text())
          owner, repo = os.environ["GITHUB_REPOSITORY"].split("/", 1)
          cfg.setdefault("github_owner", owner)
          cfg.setdefault("github_repo", repo)
          cfg.setdefault("github_branch", os.environ.get("GITHUB_REF_NAME", "main"))
          cfg.setdefault("site_title", f"{owner}'s Arka News System")
          cfg.setdefault("site_url", f"https://{owner}.github.io/{repo}/")
          p.write_text(json.dumps(cfg, indent=2))
          print(cfg)
          PY

      - name: Verify all signatures
        run: python tools/ans.py verify

      - name: Build API
        run: python tools/ans.py build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: api

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
